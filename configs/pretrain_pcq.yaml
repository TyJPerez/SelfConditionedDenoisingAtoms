lr_cosine_length: 800000 
num_epochs: 3000 
num_steps: 800000 
precision: 32

splits: null
standardize: false 

save_interval: 1
test_interval: 1

pretraining: true
self_cond: true
noise_scale: 0.04

noise_in_loader: False # Turn this to True if you want to run these models without compiling the torchnet graph kernal
allow_periodic: False # Turn this to True if you want to allow for periodic inputs

momentum_update: False
model_momentum: 0.996
val_ema_model: False

# data agumentations
random_rotate: False
torsion_angle_std: 0.0
max_bonds_rotated : 0
p_invert : 0.0

denoising_weight: 1.0 
droppath_warmup: False

parity_plot: False
plot_interval: 1

