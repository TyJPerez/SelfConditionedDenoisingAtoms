load_model: null
log_dir: experiments/
job_id: scd-s-n004_pcq
wandb_notes: "SCD pretraining with PCQ"

## DATASET & LOADER INPUTS ###
dataset: PCQM4MV2
dataset_root: tmp/pcq
dataset_arg : null
train_size: null 

test_size: 100
val_size: 100
batch_size: 64
inference_batch_size: 64
seed: 1
num_workers: 6

#choose model architecture here
model_config: configs/model_configs/scd.yaml

energy_weight: 0.0
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0005 
weight_decay: 0.05
lr_schedule: cosine
lr_factor: 0.8
