load_model: null
log_dir: experiments/
job_id: scd-amp20
wandb_notes: "SCD pretraining with AMP20"


## DATASET & LOADER INPUTS ###
dataset: AlexMP20
dataset_root: tmp/alexmp20
dataset_arg : null
train_size: null 

test_size: 100
val_size: 100
batch_size: 16 #142 
inference_batch_size: 16 #142
seed: 1
num_workers: 6

model_config: configs/model_configs/scd.yaml

energy_weight: 0.0
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0005 
lr_schedule: cosine
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 15
lr_warmup_steps: 10000 
lr_cosine_length: 800000 # consider increasing
num_epochs: 3000 
num_steps: 800000 # consider increasing
precision: 32
droppath_warmup: False

save_interval: 1
test_interval: 1

splits: null
standardize: false 


pretraining: true
self_cond: true
weight_decay: 0.05

momentum_update: False 
model_momentum: 0.996
val_ema_model: False

noise_scale: 0.04
denoising_weight: 1.0 

graph_cutoff: 5.0
noise_in_loader: True
allow_periodic: True
neighbor_method: brute
max_neighbors: 32

#unit cell augmentations
p_cell_repeat: 0.5
cell_repeat_iters: 2
rep_min_atoms: 4

# data agumentations
random_rotate: False
torsion_angle_std: 0.0
max_bonds_rotated : 0
p_invert : 0.0

