

load_model: null
log_dir: experiments/

model_config: configs/model_configs/torchnet_basic.yaml

## DATASET & LOADER INPUTS ###
dataset: QM9
dataset_root: tmp/qm9
dataset_arg : u0
train_size: 110000 #DEBUG
test_size: null
val_size: 10000
batch_size: 128
inference_batch_size: 128
seed: 1
num_workers: 6

splits: null
standardize: true # multiply prediction by dataset std and add mean

denoising_only: False 
energy_weight: 1.0 # weight on y loss
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
early_stopping_patience: 1500
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0004
lr_schedule: reduce_on_plateau
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 15
lr_warmup_steps: 10000 
lr_cosine_length: 300000
num_epochs: 3000 # DEBUG
num_steps: 300000 #DEBUG
precision: 32

save_interval: 10
test_interval: 2

wandb_notes: ""
job_id: auto

pretraining: false
self_cond: false
weight_decay: 0.0

# data agumentations
random_rotate: false
torsion_angle_std: 0
max_bonds_rotated : 0
p_invert : 0.0
noise_scale: 0.005
denoising_weight: 0.1 

# remove_ref_energy : true
prior_model: Atomref
