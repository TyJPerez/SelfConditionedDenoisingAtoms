load_model: null
log_dir: experiments/
job_id: cet-all_debug

## DATASET & LOADER INPUTS ###
dataset: ALLATOMS
dataset_root: tmp/allatoms # root already preset for allatoms dataset
dataset_arg : null
train_size: null  #debug

test_size: 200
val_size: 200
batch_size: 56 #128
inference_batch_size: 56
seed: 1
num_workers: 32

model_config: configs/model_configs/scd.yaml

denoising_only: true 
energy_weight: 0.0
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
early_stopping_patience: 150
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0005 # single node

lr_schedule: cosine
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 15
lr_warmup_steps: 10000 
lr_cosine_length: 1200000 # consider increasing
num_epochs: 10000 
num_steps: 1200000 # consider increasing
precision: 32

save_interval: 1
test_interval: 1

splits: null
standardize: false 
wandb_notes: ""
job_id: auto

pretraining: true
self_cond: true
weight_decay: 0.05

momentum_update: False # Turn on 
model_momentum: 0.996
val_ema_model: False

# data agumentations
random_rotate: False
torsion_angle_std: 0.0
max_bonds_rotated : 0
p_invert : 0.0

noise_scale: 0.04
denoising_weight: 1.0 

droppath_warmup: False

### new
noise_in_loader: False
graph_cutoff: 5.0

noise_in_loader: True
allow_periodic: True
p_cell_repeat: 0.5
cell_repeat_iters: 2

max_nodes_per_batch : 4000
batch_clipper_cache_size : 1000