
#Configureation for fintuning on energy targets of qm9
# u0, u298, h298, g298

load_model: null
log_dir: experiments/

model_config: configs/model_configs/cet_eng.yaml

### Conditions used for energy targets: u0, u298, h298, g298

## DATASET & LOADER INPUTS ###
dataset: QM9
dataset_root: tmp/qm9
dataset_arg : g298
train_size: 110000 #DEBUG
test_size: null
val_size: 10000
batch_size: 128 #128 #256 #128
inference_batch_size: 128 #256 #32 #128
seed: 1
num_workers: 6

splits: null
standardize: false #true #false 
prior_model: Atomref

denoising_only: False 
energy_weight: 1.0 # weight on y loss
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
early_stopping_patience: 1500
ngpus: -1
num_nodes: 1
redirect: false

# lr: 0.0004
lr: 0.00015
# lr: 0.0006
# lr_schedule: reduce_on_plateau
lr_schedule: cosine
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 15
lr_warmup_steps: 10000 ##10000 
lr_cosine_length: 500000
num_epochs: 6000 # DEBUG
num_steps: 500000 #DEBUG
precision: 32

save_interval: 5 
test_interval: 5 

wandb_notes: ""
job_id: auto

pretraining: false
self_cond: false
weight_decay: 0.000 #1 # TODO try turning on/off

# data agumentations
random_rotate: False
torsion_angle_std: 0
max_bonds_rotated : 0
p_invert : 0.0

noise_scale: 0.005 #5
denoising_weight: 0.5 #.2


#fine tuning specific flags
reset_head: true
reset_embeddings: true
reset_norms: 'DyT'


# kill: g298, h289, u298, cv, mu, # exploded
# rerun also: u0, alpha, zpve, R2 # poor performance
# switch: u0, u298, h298, g298 # probably wrong labels