
#THIS SCRIPT IS BEST FOR homo, lumo, gap, fine tuning
load_model: null
log_dir: experiments/

model_config: configs/model_configs/scd_omol.yaml
# allow_node_mask: False

## DATASET & LOADER INPUTS ###
dataset: OMOL25
dataset_root: 'tmp/omol25' # 
dataset_arg : 'none' # fold selection
predefined_splits: true


plot_interval: 1
parity_plot: False # TODO: fix parity plot
compute_corr: False

prior_model: null 
train_size: null #DEBUG
test_size: null
val_size: null

batch_size: 31
inference_batch_size: 8
seed: 1
num_workers: 16

splits: null
standardize: True # FIXME - Try this off
denoising_only: False 

#force computation
derivative: True 
direct_force_pred : False

gradient_clipping: 100.0
energy_weight: 0.2 # weight on y loss
force_weight: 0.8
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
early_stopping_patience: 1500 # not used - TODO: remove this
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0004 # lower when fine-tuning, 0.0001

lr_schedule: cosine
lr_factor: 0.5
lr_min: 1.0e-07
lr_patience: 15 # not used
lr_warmup_steps: 5000 
lr_cosine_length: 150000
num_steps: 150000 #DEBUG
num_epochs: 3000 # DEBUG
precision: 32

save_interval: 1 
test_interval: 10000
val_interval: 1

wandb_notes: ""
job_id: auto

pretraining: false
self_cond: false

weight_decay: 0.05 # Try lowering to 1e5
droppath_warmup: True
init_droppath: 0.15
final_droppath: 0.0
beta1: 0.995

momentum_update: False
model_momentum: 0.996
val_ema_model: False

# data agumentations
random_rotate: False
torsion_angle_std: 0
max_bonds_rotated : 0
p_invert : 0.0

noise_scale: 0.0000000
denoising_weight: 0.000000


graph_cutoff: 5.0 # consider increasing?
noise_in_loader: False
allow_periodic: False
p_cell_repeat: 0.0
cell_repeat_iters: 0
rep_min_atoms : 0

#batch clipping 
max_nodes_per_batch : 1800
batch_clipper_cache_size : 500
allow_test_clipping : False

