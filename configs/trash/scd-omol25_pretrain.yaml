load_model: null
log_dir: experiments/
job_id: ct-scd-omol25_debug

## DATASET & LOADER INPUTS ###
dataset: OMOL25
dataset_root: 'tmp/omol25' # 
dataset_arg : 'none' # fold selection
predefined_splits: true

plot_interval: 1
parity_plot: False # TODO: fix parity plot
compute_corr: False

prior_model: null 
train_size: null #DEBUG
test_size: null
val_size: null


batch_size: 48 #128
inference_batch_size: 16
seed: 1
num_workers: 48

model_config: configs/model_configs/scd_omol.yaml
# model_config: configs/model_configs/scd.yaml

denoising_only: true 
energy_weight: 0.0
force_weight: 1.0
ema_alpha_dy: 1.0
ema_alpha_y: 1.0

distributed_backend: ddp
early_stopping_patience: 150
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.0005 # single node

lr_schedule: cosine
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 15
lr_warmup_steps: 10000 
lr_cosine_length: 800000 # consider increasing
num_epochs: 10000 
num_steps: 800000 # consider increasing
precision: 32

save_interval: 1
test_interval: 1

splits: null
standardize: false 
wandb_notes: ""
job_id: auto

pretraining: true
self_cond: true
weight_decay: 0.05

momentum_update: False 
model_momentum: 0.996
val_ema_model: False

# data agumentations
random_rotate: False
torsion_angle_std: 0.0
max_bonds_rotated : 0
p_invert : 0.0

noise_scale: 0.04
denoising_weight: 1.0 

droppath_warmup: False
#default drop path is on 0.1

### new
graph_cutoff: 5.0 
noise_in_loader: False
allow_periodic: False
p_cell_repeat: 0.0
cell_repeat_iters: 0
rep_min_atoms : 0

#batch clipping 
max_nodes_per_batch : 2800
batch_clipper_cache_size : 500
allow_test_clipping : False