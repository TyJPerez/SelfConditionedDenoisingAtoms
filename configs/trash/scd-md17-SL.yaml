

load_model: null
log_dir: experiments/

# model_config: configs/model_configs/scd_small.yaml # this is the correct arch
model_config: configs/model_configs/scd.yaml # FIXME temporary

## DATASET & LOADER INPUTS ###
dataset: MD17
dataset_root: tmp/md17
dataset_arg : benzene
train_size: 950 #DEBUG
test_size: null
val_size: 50
batch_size: 8 #128
# batch_size: 16
inference_batch_size: 512 #128
seed: 1
num_workers: 6

splits: null
standardize: True 
prior_model: null

derivative: True # TODO write correction in create model
gradient_clipping: 40.0

denoising_only: False 
energy_weight: 0.2 # weight on y loss
force_weight: 0.8

ema_alpha_dy: 1.0
ema_alpha_y: 0.05

distributed_backend: ddp
early_stopping_patience: 3000
ngpus: -1
num_nodes: 1
redirect: false

lr: 0.001
# lr_schedule: reduce_on_plateau
lr_schedule: cosine
lr_factor: 0.8
lr_min: 1.0e-07
lr_patience: 30
lr_warmup_steps: 1000 
lr_cosine_length: 150000
num_epochs: 300000 # DEBUG
num_steps: 200000 #DEBUG
precision: 32

save_interval: 100
test_interval: 25
val_interval: 1

wandb_notes: ""
job_id: auto

pretraining: false
self_cond: false

weight_decay: 0.01 # TESTING
droppath_warmup: True
init_droppath: 0.15
final_droppath: 0.0

momentum_update: False
model_momentum: 0.996
val_ema_model: False

# data agumentations
random_rotate: false
torsion_angle_std: 0
max_bonds_rotated : 0
p_invert : 0.0

noise_scale: 0.00 #0.005
denoising_weight: 0.1 


add_head_to_pred : False
